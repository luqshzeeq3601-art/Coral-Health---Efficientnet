<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Coral AI Brain Logo">
  <defs>
    <linearGradient id="brG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D06830"/>
      <stop offset="100%" stop-color="#A84A1C"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#FAFAF8" stroke="#E0DDD4" stroke-width="2"/>
  <!-- Brain shape -->
  <g transform="translate(32,30)" fill="none" stroke="url(#brG)" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M-2,-16 C-2,-20 -6,-22 -10,-20 C-14,-18 -16,-13 -16,-9
             C-18,-7 -19,-3 -17,1 C-19,4 -18,9 -14,11
             C-13,14 -9,16 -5,15 C-3,15 -2,14 -1,12" stroke-width="2.5"/>
    <!-- Right hemisphere -->
    <path d="M2,-16 C2,-20 6,-22 10,-20 C14,-18 16,-13 16,-9
             C18,-7 19,-3 17,1 C19,4 18,9 14,11
             C13,14 9,16 5,15 C3,15 2,14 1,12" stroke-width="2.5"/>
    <!-- Central fissure -->
    <path d="M0,-17 L0,13" stroke-width="2" opacity="0.7"/>
    <!-- Left sulci (folds) -->
    <path d="M-1,-10 C-5,-11 -9,-9 -12,-6" stroke-width="1.8"/>
    <path d="M-1,-3 C-5,-4 -10,-2 -14,2" stroke-width="1.8"/>
    <path d="M-1,5 C-4,4 -8,5 -11,8" stroke-width="1.8"/>
    <!-- Right sulci (folds) -->
    <path d="M1,-10 C5,-11 9,-9 12,-6" stroke-width="1.8"/>
    <path d="M1,-3 C5,-4 10,-2 14,2" stroke-width="1.8"/>
    <path d="M1,5 C4,4 8,5 11,8" stroke-width="1.8"/>
  </g>
  <!-- Brain stem -->
  <path d="M32,43 L32,50" stroke="url(#brG)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Neural network dots -->
  <g fill="#C85A24" opacity="0.6">
    <circle cx="32" cy="54" r="2"/>
    <circle cx="24" cy="56" r="1.5"/>
    <circle cx="40" cy="56" r="1.5"/>
  </g>
  <!-- Connecting lines -->
  <g stroke="#C85A24" stroke-width="1.2" stroke-linecap="round" opacity="0.5">
    <line x1="32" y1="52" x2="25" y2="55"/>
    <line x1="32" y1="52" x2="39" y2="55"/>
  </g>
</svg>